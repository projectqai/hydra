name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - '*'

env:
  GO_VERSION: '1.25.3'
  PROTOC_VERSION: '28.3'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node.js modules
        uses: actions/cache@v4
        with:
          path: builtin/view/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('builtin/view/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y wget unzip

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install wget

      - name: Install protoc
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            PROTOC_ARCH="linux-x86_64"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            PROTOC_ARCH="osx-x86_64"
          fi
          wget https://github.com/protocolbuffers/protobuf/releases/download/v${{ env.PROTOC_VERSION }}/protoc-${{ env.PROTOC_VERSION }}-${PROTOC_ARCH}.zip
          sudo unzip protoc-${{ env.PROTOC_VERSION }}-${PROTOC_ARCH}.zip -d /usr/local
          sudo chmod +x /usr/local/bin/protoc

      - name: Install Go tools
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@latest
          go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc@latest
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest

      - name: Install frontend dependencies
        run: |
          cd builtin/view && npm ci && cd ../..

      - name: Generate code and build frontend
        run: make

      - name: Set tag name for binaries
        id: tag
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "TAG_NAME=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          TAG_NAME=${{ steps.tag.outputs.TAG_NAME }}
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            go build -o hydra-${{ matrix.goos }}-${{ matrix.goarch }}-${TAG_NAME}.exe .
          else
            go build -o hydra-${{ matrix.goos }}-${{ matrix.goarch }}-${TAG_NAME} .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hydra-${{ matrix.goos }}-${{ matrix.goarch }}-${{ steps.tag.outputs.TAG_NAME }}
          path: |
            hydra-*
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: hydra-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}

            ## Downloads
            - Linux AMD64: hydra-linux-amd64-${{ github.ref_name }}
            - Linux ARM64: hydra-linux-arm64-${{ github.ref_name }}
            - Windows AMD64: hydra-windows-amd64-${{ github.ref_name }}.exe
            - macOS ARM64 (Apple Silicon): hydra-darwin-arm64-${{ github.ref_name }}
          files: |
            hydra-linux-amd64-*
            hydra-linux-arm64-*
            hydra-windows-amd64-*.exe
            hydra-darwin-arm64-*
          draft: false
          prerelease: false
